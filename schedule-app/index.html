<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>IMAUser - 智能日程看板</title>
    <style>
      html { background: #0d1117; color: #e6edf3; }
      html[data-theme="light"] { background: #f6f8fa; color: #1f2328; }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem('ima_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
